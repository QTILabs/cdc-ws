# CDC Workspace — Docker Compose
# =============================================================================
# Usage:
#   docker compose build          # Build all images
#   docker compose up -d          # Start all services
#   docker compose up -d cdc-daemon  # Start single service
#   docker compose logs -f        # Tail logs
#   docker compose down           # Stop all
#
# Prerequisites:
#   cp .env.example .env          # Fill in OS_PASSWORD, RW_HOST, etc.
# =============================================================================

services:

  cdc-daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PACKAGE: cdc-daemon
        BINARY: cdc-daemon
        EXPOSE_PORT: "50051"
        RUST_IMAGE: rust:1.88-slim-bookworm
        RUNTIME_IMAGE: debian:bookworm-slim
    image: cdc-daemon:latest
    container_name: cdc-daemon
    restart: unless-stopped
    ports:
      - "50051:50051"
    env_file:
      - .env
    volumes:
      - ./pipelines.yaml:/app/pipelines.yaml:ro
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cdc-net

  cdc-bff:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PACKAGE: cdc-bff
        BINARY: cdc-bff
        EXPOSE_PORT: "8080"
        RUST_IMAGE: rust:1.88-slim-bookworm
        RUNTIME_IMAGE: debian:bookworm-slim
    image: cdc-bff:latest
    container_name: cdc-bff
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CDC_DAEMON_GRPC_URL: http://cdc-daemon:50051
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      cdc-daemon:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - cdc-net

  cdc-web-console:
    build:
      context: .
      dockerfile: docker/cdc-web-console.Dockerfile
    image: cdc-web-console:latest
    container_name: cdc-web-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      cdc-bff:
        condition: service_healthy
    networks:
      - cdc-net

  nginx-ingress:
    image: nginx:1.27-alpine
    container_name: nginx-ingress
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      cdc-bff:
        condition: service_healthy
      cdc-web-console:
        condition: service_started
    networks:
      - cdc-net

networks:
  cdc-net:
    name: cdc-network
    driver: bridge
