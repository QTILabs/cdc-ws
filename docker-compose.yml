# CDC Workspace — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # Start semua service
#   docker compose up -d cdc-bff  # Start satu service
#   docker compose logs -f        # Lihat log
#   docker compose down           # Stop semua
#   docker compose build          # Build ulang
#
# Prasyarat:
#   - Copy .env.example → .env   lalu isi OS_PASSWORD & IP sesuai env
#   - Jalankan dari project root (cdc-ws/)
# =============================================================================

services:

  # ── CDC Daemon ──────────────────────────────────────────────────────────────
  cdc-daemon:
    build:
      context: .
      dockerfile: docker/cdc-daemon.Dockerfile
    image: cdc-daemon:latest
    container_name: cdc-daemon
    restart: unless-stopped
    ports:
      - "50051:50051"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cdc-net

  # ── BFF API Gateway ─────────────────────────────────────────────────────────
  cdc-bff:
    build:
      context: .
      dockerfile: docker/cdc-bff.Dockerfile
    image: cdc-bff:latest
    container_name: cdc-bff
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CDC_DAEMON_GRPC_URL: http://cdc-daemon:50051
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      cdc-daemon:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - cdc-net

  # ── Frontend Web Console ────────────────────────────────────────────────────
  # SolidStart SSR → Node.js runtime
  cdc-web-console:
    build:
      context: .
      dockerfile: docker/cdc-web-console.Dockerfile
    image: cdc-web-console:latest
    container_name: cdc-web-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      cdc-bff:
        condition: service_started
    networks:
      - cdc-net

  # ── Nginx Ingress ───────────────────────────────────────────────────────────
  # Reverse proxy: /api → BFF, everything else → FE
  nginx-ingress:
    image: nginx:1.27-alpine
    container_name: nginx-ingress
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      cdc-bff:
        condition: service_started
      cdc-web-console:
        condition: service_started
    networks:
      - cdc-net

networks:
  cdc-net:
    name: cdc-network
    driver: bridge
